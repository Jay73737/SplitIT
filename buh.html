<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pill Button — Outside Glow with Moving Bright Head</title>
<style>
  /* ============ TUNABLE TOKENS (edit these) ============ */
  :root{
    /* Motion */
    --orbit-speed: 4.5s;      /* lower = faster */
    --pause-on-hover: 0;      /* 1 pauses the motion on hover */

    /* Head + tail geometry (pathLength = 1000 units) */
    --head-len: 60;           /* bright head length */
    --tail-len: 180;          /* fading tail length */

    /* Stroke widths (outside-only via mask) */
    --head-w: 10px;           /* narrower, brighter */
    --tail-w: 26px;           /* wider, softer */

    /* Blur strengths */
    --head-blur: 6px;
    --tail-blur: 16px;

    /* Opacities */
    --head-alpha: 0.95;       /* bright head */
    --tail-alpha: 0.45;       /* soft tail */
    --base-alpha: 0.18;       /* static base halo around entire pill */

    /* Base halo thickness/blur */
    --base-w: 20px;
    --base-blur: 20px;

    /* Glow color (white by default; use a tint if desired) */
    --glow: 255 255 255;

    /* Pill body */
    --pill-bg: rgba(255,255,255,0.06);
    --pill-border: rgba(255,255,255,0.14);
    --pill-text: #e9eef4;
    --shine: rgba(255,255,255,0.08);

    /* Page */
    --page: #0b0f12;
  }

  /* Page chrome (demo only) */
  html,body{
    height:100%; margin:0;
    background: radial-gradient(1000px 700px at 20% -10%, #121922 0%, var(--page) 60%) fixed;
    color:#c8d2da;
    font:16px/1.45 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  }
  .wrap{ min-height:100%; display:grid; place-items:center; padding:40px 16px; }

  /* ============ PILL (no inner spinning stroke) ============ */
  .pill{
    position:relative;
    width:min(780px, 92vw);
    height:64px;
    border-radius:9999px;
    background: var(--pill-bg);
    border: 1px solid var(--pill-border);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.05),
      0 12px 30px rgba(0,0,0,0.45);
    display:flex; align-items:center; justify-content:center;
    overflow:visible; /* glow spills outside */
  }
  .label{
    color: var(--pill-text);
    font-weight: 700;
    letter-spacing: .2px;
    user-select: none;
  }

  /* ============ OUTSIDE GLOW (SVG overlay) ============ */
  .halo{ position:absolute; inset:0; overflow:visible; pointer-events:none; }
  .halo rect{ fill:none; vector-effect: non-scaling-stroke; stroke-linecap: round; }

  /* Static base halo around entire pill border (subtle) */
  .baseHalo{
    stroke: rgba(var(--glow), var(--base-alpha));
    stroke-width: var(--base-w);
    filter: url(#blurBase);
  }

  /* Moving tail (soft + wide) */
  .tail{
    stroke: rgba(var(--glow), var(--tail-alpha));
    stroke-width: var(--tail-w);
    filter: url(#blurTail);
    stroke-dasharray: var(--tail-len) 1000;
    animation: dash var(--orbit-speed) linear infinite;
  }

  /* Moving head (bright + narrower) */
  .head{
    stroke: rgba(var(--glow), var(--head-alpha));
    stroke-width: var(--head-w);
    filter: url(#blurHead);
    stroke-dasharray: var(--head-len) 1000;
    animation: dash var(--orbit-speed) linear infinite;
  }

  /* Animate dash around the rounded-rect path (outside only via mask) */
  @keyframes dash { to { stroke-dashoffset: -1000; } }

  /* Optional pause-on-hover */
  .pill:hover .head,
  .pill:hover .tail{
    animation-play-state: calc(var(--pause-on-hover) * 1) paused;
  }

  /* Reduced motion: park the streak */
  @media (prefers-reduced-motion: reduce){
    .head,.tail{ animation:none; stroke-dashoffset:-120; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="pill" role="button" aria-label="Split Audio">
      <span class="label">Split Audio</span>

      <!-- SVG overlay that renders the outside glow + moving bright head -->
      <svg class="halo" viewBox="0 0 1000 120" preserveAspectRatio="none" aria-hidden="true">
        <defs>
          <!-- Subtle body shine (optional) -->
          <linearGradient id="bodyShine" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--shine)"/>
            <stop offset="100%" stop-color="transparent"/>
          </linearGradient>

          <!-- Blur filters -->
          <filter id="blurBase" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="20"/>
          </filter>
          <filter id="blurHead" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="6"/>
          </filter>
          <filter id="blurTail" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="16"/>
          </filter>

          <!-- Mask that hides the inside of the pill so glow shows ONLY outside -->
          <mask id="outsideMask" maskUnits="userSpaceOnUse">
            <!-- white canvas -->
            <rect x="-2000" y="-2000" width="5000" height="5000" fill="white"/>
            <!-- black inner pill (cut-out) -->
            <rect x="0" y="10" width="1000" height="100" rx="50" ry="50" fill="black"/>
          </mask>
        </defs>

        <!-- Optional subtle body shine -->
        <rect x="0" y="10" width="1000" height="100" rx="50" ry="50" fill="url(#bodyShine)" opacity="0.15"/>

        <!-- Static outside halo -->
        <g mask="url(#outsideMask)">
          <rect class="baseHalo" x="0" y="10" width="1000" height="100" rx="50" ry="50" />
        </g>

        <!-- Moving bright head + tail (outside-only) -->
        <g mask="url(#outsideMask)">
          <!-- pathLength=1000 -> easier dash math -->
          <rect class="tail" x="0" y="10" width="1000" height="100" rx="50" ry="50" pathLength="1000"/>
          <rect class="head" x="0" y="10" width="1000" height="100" rx="50" ry="50" pathLength="1000"/>
        </g>
      </svg>
    </div>
  </div>
</body>
</html>
